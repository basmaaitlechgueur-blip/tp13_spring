<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OAuth2 Demo - Accueil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Effet de particules */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px 30px;
            color: white;
        }

        .card-header h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card-header .subtitle {
            font-size: 18px;
            opacity: 0.95;
        }

        .card-body {
            padding: 40px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .feature-item {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            background: #f0f4ff;
        }

        .feature-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .feature-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 12px;
            color: #718096;
        }

        .login-btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .security-badge {
            margin-top: 30px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 12px;
            font-size: 12px;
            color: #667eea;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .card-header h1 {
                font-size: 32px;
            }

            .card-header .subtitle {
                font-size: 14px;
            }

            .card-body {
                padding: 25px;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .login-btn {
                padding: 14px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>🔐 OAuth2 Demo</h1>
            <p class="subtitle">Authentification sécurisée avec Google</p>
        </div>

        <div class="card-body">
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">🔒</div>
                    <div class="feature-title">Sécurisé</div>
                    <div class="feature-desc">Protocole OAuth2</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">✅</div>
                    <div class="feature-title">Simple</div>
                    <div class="feature-desc">Connexion en 1 clic</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">👤</div>
                    <div class="feature-title">Profil</div>
                    <div class="feature-desc">Informations utilisateur</div>
                </div>
            </div>

            <a href="/login" class="login-btn">
                Se connecter avec Google
            </a>

            <div class="security-badge">
                 Authentification via OpenID Connect (OIDC) • Vos données sont sécurisées
            </div>
        </div>
    </div>
</div>
</body>
</html>
